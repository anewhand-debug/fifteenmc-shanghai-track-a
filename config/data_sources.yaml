datasets:
  - id: shanghai_admin_boundary
    title: Shanghai administrative boundary
    source: Local GeoJSON boundary file in course data folder
    local_path_key: shanghai_boundary
    collection_date: "2026-05-27"
    license_or_terms: Course-provided local data; verify redistribution rights before public release.
    fields:
      - district or name fields vary by source
      - polygon geometry
    cleaning:
      - Reproject to EPSG:4326 and EPSG:32651 for analysis.
      - Dissolve district polygons to one Shanghai study boundary.
      - Repair invalid geometries.
    limitations:
      - Administrative coastline and water treatment may differ from other sources.

  - id: local_roads
    title: Shanghai road network
    source: Local simplified road parquet and course shapefile road layers
    local_path_key: roads_simplified
    collection_date: "2026-05-27"
    license_or_terms: Course-provided local data; verify redistribution rights before public release.
    fields:
      - road class or highway-like category if present
      - geometry
    cleaning:
      - Reproject to metric CRS.
      - Filter unusable geometries.
      - Assign mode speeds for walk, bike, car approximation.
    limitations:
      - Does not guarantee routable topology or turn restrictions.
      - Isochrones are approximate unless an external routing API is supplied.

  - id: sports_fitness_poi
    title: Sports and fitness services POI
    source: Local Shanghai sports fitness service shapefile
    local_path_key: sports_poi
    collection_date: "2023-01-14"
    license_or_terms: Course-provided POI data; do not republish raw dataset unless allowed.
    fields:
      - name
      - category or type fields, depending on source schema
      - point geometry
    cleaning:
      - Normalize names and category labels.
      - Map raw categories to Track A amenity groups.
      - Remove duplicate name-coordinate pairs.
    limitations:
      - POI completeness and category labels may be uneven.
      - Public/private facility status may require manual validation.

  - id: baseline_daily_poi
    title: Baseline daily amenity POI layers
    source: Local 2021.08 course shapefiles for food, shopping, healthcare, education, finance, other facilities, and parks
    local_path_key: food_poi
    collection_date: "2021-08-26 / 2021-11-30 / 2022-04-22"
    license_or_terms: Course-provided local POI data; do not republish raw records unless permitted.
    fields:
      - place name
      - category/type fields where available
      - point geometry or polygon centroid
    cleaning:
      - Normalize each source to a shared POI schema.
      - Map records to baseline groups: food, healthcare, education, parks, and daily services.
      - Convert polygon-only facilities to representative points for accessibility counts.
    limitations:
      - Some categories are broad proxies, for example shopping may include more than fresh food.
      - Opening hours, capacity, price, and quality are not modeled.

  - id: track_a_sports_polygons
    title: Track A sports facility polygons
    source: Local sports field, sports center, swimming pool, and running track polygon shapefiles
    local_path_key: sports_field_polygons
    collection_date: "2021-08-27"
    license_or_terms: Course-provided local POI/AOI data.
    fields:
      - facility name or category fields where available
      - polygon geometry
    cleaning:
      - Repair geometries.
      - Convert polygons to representative points for isochrone counts.
      - Map to sports_fields_courts or swimming_pool_public Track A categories.
    limitations:
      - Public/private status is not guaranteed.
      - Facility access, fees, and current operating status are not modeled.

  - id: transit_stops_lines
    title: Shanghai metro and bus stops/lines
    source: Local metro and bus shapefiles
    local_path_key: metro_stations
    collection_date: "2023-12-19 / 2024-07-13"
    license_or_terms: Course-provided transit GIS data.
    fields:
      - station or stop name
      - route or line name where available
      - point or line geometry
    cleaning:
      - Reproject to metric CRS.
      - Merge metro stations, exits, and bus stops into transit access layer.
      - Calculate nearest metro distance.
    limitations:
      - Headways, timetables, fares, crowding, and transfers are not modeled unless GTFS is added.

  - id: green_landuse
    title: Green polygons and land-use layers
    source: Local green parquet, ESA land-use raster, and AOI/land-use shapefiles
    local_path_key: green_polygons
    collection_date: "2026-05-28 / 2023-06-29"
    license_or_terms: Course-provided and open land-use layers; verify redistribution terms.
    fields:
      - class or land-use type
      - polygon or raster geometry
    cleaning:
      - Clip to Shanghai.
      - Compute green coverage ratio by grid/isochrone.
      - Use as greenery proxy if Sentinel-2 NDVI is not computed.
    limitations:
      - Green coverage proxy is not identical to NDVI.
      - Vegetation season and raster acquisition date affect greenness estimates.

  - id: housing_rent_price
    title: Housing price and rent proxy
    source: Local Anjuke/real-estate files and house price shapefile
    local_path_key: house_price_points
    collection_date: "2024-06-07 / 2026-05-27"
    license_or_terms: Course-provided local data; raw listings should not be republished.
    fields:
      - price or rent fields where available
      - residential project name
      - location geometry
    cleaning:
      - Parse numeric price/rent values.
      - Spatially aggregate to grid/H3.
      - Convert to rent/price band for web display.
    limitations:
      - Listing prices are not transaction prices.
      - Rent and sale price fields may be mixed depending on source.

  - id: mobike_activity
    title: Shanghai bike-share activity
    source: UTSEUS Mobike Shanghai full CSV
    local_path_key: mobike_csv
    collection_date: "2026-05-27"
    license_or_terms: Course-provided local data.
    fields:
      - trip origin/destination coordinates if present
      - trip timestamps if present
    cleaning:
      - Use only aggregated activity density if included in analysis.
      - Remove impossible coordinates.
    limitations:
      - Historic bike-share data may not represent current cycling demand.

  - id: air_quality_optional
    title: AQI daily district average
    source: AQICN/CNEMC API or user-supplied CSV
    local_path_key: aqi_notes
    collection_date: "User supplied at runtime"
    license_or_terms: Follow API provider terms; API tokens must remain in .env.
    fields:
      - date
      - district_name
      - aqi
      - pm25
    cleaning:
      - Validate district names.
      - Aggregate monitoring stations to district-day averages.
    limitations:
      - If only sample CSV is present, it is used for interface testing and excluded from official scoring.
